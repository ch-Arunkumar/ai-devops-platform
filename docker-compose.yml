services:

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - APP_VERSION=1.0.0
      - ENVIRONMENT=development
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: on-failure

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - APP_VERSION=1.0.0
      - ENVIRONMENT=development
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: on-failure

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    environment:
      - APP_VERSION=1.0.0
      - ENVIRONMENT=development
      - USER_SERVICE_URL=http://user-service:5000
      - PRODUCT_SERVICE_URL=http://product-service:5001
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5002/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: on-failure

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - app-network
    restart: on-failure

networks:
  app-network:
    driver: bridge
