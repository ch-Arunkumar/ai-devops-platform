events {
    worker_connections 1024;
}

http {
    # Wait and retry if upstream is not ready
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;

    upstream user_service {
        server user-service:5000;
    }

    upstream product_service {
        server product-service:5001;
    }

    upstream order_service {
        server order-service:5002;
    }

    server {
        listen 80;

        # Health check for the gateway itself
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # User Service
        location /api/users {
            proxy_pass         http://user_service/users;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Product Service
        location /api/products {
            proxy_pass         http://product_service/products;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Order Service
        location /api/orders {
            proxy_pass         http://order_service/orders;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Default
        location / {
            return 404 '{"error":"Not found. Use /api/users, /api/products, /api/orders"}';
            add_header Content-Type application/json;
        }
    }
}
