name: CI Pipeline

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Test user-service
        run: |
          cd services/user-service
          pip install -r requirements.txt pytest pytest-cov
          pytest tests/ -v
      - name: Test product-service
        run: |
          cd services/product-service
          pip install -r requirements.txt pytest pytest-cov
          pytest tests/ -v
      - name: Test order-service
        run: |
          cd services/order-service
          pip install -r requirements.txt pytest pytest-cov
          pytest tests/ -v

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build user-service
        run: docker build -t user-service:scan services/user-service/
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'user-service:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL'
          ignore-unfixed: true

  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push user-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ github.sha }} services/user-service/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ github.sha }}
      - name: Build and push product-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/product-service:${{ github.sha }} services/product-service/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/product-service:${{ github.sha }}
      - name: Build and push order-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/order-service:${{ github.sha }} services/order-service/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/order-service:${{ github.sha }}
      - name: Done
        run: |
          echo "✅ All images pushed to Docker Hub!"
          echo "Tag: ${{ github.sha }}"