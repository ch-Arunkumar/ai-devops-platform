apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-healer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-healer
  template:
    metadata:
      labels:
        app: ai-healer
    spec:
      serviceAccountName: ai-healer-sa
      containers:
      - name: ai-healer
        image: arunrox47/ai-healer:latest
        ports:
        - containerPort: 5010
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-healer-secrets
              key: OPENAI_API_KEY
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: ai-healer-secrets
              key: SLACK_WEBHOOK_URL
        readinessProbe:
          httpGet:
            path: /health
            port: 5010
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-healer
spec:
  selector:
    app: ai-healer
  ports:
  - port: 5010
    targetPort: 5010
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-healer-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-healer-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "delete", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-healer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-healer-role
subjects:
- kind: ServiceAccount
  name: ai-healer-sa
  namespace: default