apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: arunrox47/order-service:latest
        ports:
        - containerPort: 5002
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: USER_SERVICE_URL
          value: "http://user-service:5000"
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service:5001"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
  - port: 5002
    targetPort: 5002
  type: ClusterIP